name: Release

on:
  push:
    branches:
      - release-test

permissions:
  contents: write

jobs:
  build_release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Preflight
        run: |
          set -euo pipefail
          xcodebuild -version
          ruby --version
          make --version
          command -v hdiutil
          command -v osascript
          command -v SetFile
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi

      - name: Determine release version
        run: |
          set -euo pipefail
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Slate/Slate-Info.plist)"
          echo "TAG_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"

      - name: Run tests
        run: make test

      - name: Build release DMG
        run: make release

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG_VERSION}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${TAG_VERSION}" \
              -R "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG_VERSION}" \
              --notes "Temporary automated release from release-test branch."
          fi

      - name: Prepare release assets
        run: |
          set -euo pipefail
          DMG_PATH="build/Release/Slate.dmg"
          VERSIONED_DMG="build/Release/Slate-${TAG_VERSION}.dmg"
          CHECKSUM_PATH="${VERSIONED_DMG}.sha256"
          mv "${DMG_PATH}" "${VERSIONED_DMG}"
          shasum -a 256 "${VERSIONED_DMG}" > "${CHECKSUM_PATH}"
          echo "DMG_PATH=${VERSIONED_DMG}" >> "${GITHUB_ENV}"
          echo "CHECKSUM_PATH=${CHECKSUM_PATH}" >> "${GITHUB_ENV}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${TAG_VERSION}" "${DMG_PATH}" "${CHECKSUM_PATH}" --clobber

      - name: Job summary
        run: |
          {
            echo "## Release build"
            echo
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Tag: ${TAG_VERSION}"
            echo "- DMG: $(basename "${DMG_PATH}")"
            echo "- SHA256: $(basename "${CHECKSUM_PATH}")"
          } >> "${GITHUB_STEP_SUMMARY}"
